# cargo-deny configuration — enforces Signal Model (STRATEGY §11.3, DATA §2).
# "perceptkit binary has zero network calls."

[advisories]
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Signal Model: core must never pull a network crate.
# These are banned workspace-wide. If v0.2+ introduces a feature-gated
# optional Reflector backend that needs network, the crate author MUST
# update deny.toml with an explicit exception and justification.
[[bans.deny]]
name = "reqwest"

[[bans.deny]]
name = "hyper"

[[bans.deny]]
name = "hyper-util"

[[bans.deny]]
name = "surf"

[[bans.deny]]
name = "ureq"

[[bans.deny]]
name = "awc"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
