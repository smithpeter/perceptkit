id: near_silence
version: 1
describe:
  template: "近乎静音"
match:
  all:
    # ESC-50 empirical distribution (see docs/real-accuracy-results.md):
    # driving mean=-13.7 dB, quiet scenes mean ~-19 dB, with p10 at -25.
    # For raw (non-normalized) audio, use absolute rms_db; for normalized
    # datasets, rms_db_pn captures dynamic range. We require BOTH to be
    # conservatively low — this is a "truly silent" classifier and we'd
    # rather miss than false-fire on noisy rooms.
    - { feature: audio.rms_db_pn, op: lt, value: -25.0 }
    - { feature: audio.voice_ratio, op: lt, value: 0.1 }
priority: 2
